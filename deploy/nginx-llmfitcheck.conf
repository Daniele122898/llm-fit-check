# llmfitcheck.com as a vhost behind an existing nginx.
#
# Install:
#   sudo cp deploy/nginx-llmfitcheck.conf /etc/nginx/sites-available/llmfitcheck.conf
#   sudo ln -s /etc/nginx/sites-available/llmfitcheck.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d llmfitcheck.com -d www.llmfitcheck.com --redirect
#
# certbot --nginx rewrites these blocks with TLS + the http->https redirect.

server {
    listen 80;
    listen [::]:80;
    server_name llmfitcheck.com;

    location / {
        proxy_pass http://127.0.0.1:8400;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # a cold trending refresh against Hugging Face can take a minute
        proxy_read_timeout 180s;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name www.llmfitcheck.com;
    return 301 https://llmfitcheck.com$request_uri;
}
