services:
  app:
    build: .
    restart: unless-stopped
    init: true
    environment:
      - FITCHECK_DB=/data/fitcheck.db
      - HF_TOKEN=${HF_TOKEN:-}
    volumes:
      - ./data:/data
    expose:
      - "8400"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp" # HTTP/3
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  caddy_data:
  caddy_config:
